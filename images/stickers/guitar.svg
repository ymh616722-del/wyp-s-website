<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 180" fill="none">
  <g stroke="#000" stroke-width="2.5" stroke-linecap="round">
    <!-- neck -->
    <rect x="44" y="5" width="12" height="90" rx="3" fill="#8B4513"/>
    <!-- frets -->
    <line x1="44" y1="20" x2="56" y2="20" stroke="#ccc" stroke-width="1.5"/>
    <line x1="44" y1="35" x2="56" y2="35" stroke="#ccc" stroke-width="1.5"/>
    <line x1="44" y1="50" x2="56" y2="50" stroke="#ccc" stroke-width="1.5"/>
    <line x1="44" y1="65" x2="56" y2="65" stroke="#ccc" stroke-width="1.5"/>
    <!-- strings -->
    <line x1="47" y1="5" x2="47" y2="155" stroke="#ddd" stroke-width="0.8"/>
    <line x1="50" y1="5" x2="50" y2="155" stroke="#ddd" stroke-width="0.8"/>
    <line x1="53" y1="5" x2="53" y2="155" stroke="#ddd" stroke-width="0.8"/>
    <!-- headstock -->
    <rect x="40" y="0" width="20" height="10" rx="3" fill="#1a1a1a"/>
    <!-- body -->
    <path d="M50 90 Q20 100 15 125 Q10 150 30 165 Q45 175 50 170 Q55 175 70 165 Q90 150 85 125 Q80 100 50 90Z" fill="#c0392b"/>
    <!-- sound hole -->
    <circle cx="50" cy="135" r="12" fill="#1a1a1a"/>
    <!-- pickguard -->
    <path d="M50 120 Q60 125 58 140 Q55 148 50 145Z" fill="#111"/>
  </g>
</svg>